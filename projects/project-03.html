<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HR 人事管理系统 | 作品集</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

  <div class="detail">
    <nav class="detail-nav">
      <div class="detail-nav__inner">
        <a class="detail-back" href="../index.html">返回首页</a>
      </div>
    </nav>

    <article class="detail-page">
      <header class="detail-hero">
        <p class="detail-hero__type">人事 · 流程设计 · 2024</p>
        <h1>HR 人事管理系统</h1>
        <div class="detail-hero__role">
          <span class="detail-hero__role-label">设计职责</span>
          <p class="detail-hero__role-text">负责招聘、考勤、绩效全流程体验设计，优化复杂表单与审批链路，推动移动端外勤场景适配。</p>
        </div>
        <p class="detail-desc">覆盖招聘、考勤、绩效模块，简化 HR 日常操作路径。</p>
      </header>

      <section class="detail-section">
        <h2>设计背景</h2>
        <p>HR 团队反馈现有系统功能齐全但操作繁琐，新人上手周期长，移动端几乎不可用。</p>
      </section>

      <section class="detail-section">
        <h2>需求分析</h2>
        <ul>
          <li>HR 专员：批量处理入离职、排班与假期审批</li>
          <li>部门主管：绩效打分、团队考勤概览</li>
          <li>员工：自助查薪、请假、证明开具</li>
        </ul>
      </section>

      <section class="detail-section">
        <h2>设计思路</h2>
        <p>以「任务驱动」重组首页，将待办事项置顶；长表单采用分步填写 + 自动保存，减少数据丢失焦虑。</p>
      </section>

      <section class="detail-section">
        <h2>核心设计展示</h2>
        <div class="detail-gallery">
          <figure class="detail-figure">
            <img src="../assets/projects/project-03/01.jpg" alt="HR 工作台">
          </figure>
          <figure class="detail-figure">
            <img src="../assets/projects/project-03/02.jpg" alt="招聘流程">
            <figcaption>招聘全流程 — 从需求到 Offer</figcaption>
          </figure>
        </div>
      </section>
    </article>
  </div>

</body>
</html>
